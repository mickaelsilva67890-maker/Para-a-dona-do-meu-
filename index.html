<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Para Tauane</title>

<style>

body{
margin:0;
height:100vh;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Georgia;
text-align:center;
overflow:hidden;
}

/* estrelas */

.estrelas{
position:absolute;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:mover 60s linear infinite;
opacity:0.4;
}

@keyframes mover{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

h1{
font-size:70px;
letter-spacing:6px;
color:#ff4d6d;
animation:aparecer 4s forwards;
}

p{
font-size:22px;
max-width:650px;
margin-top:20px;
}

button{
margin-top:25px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* corações */

.coracao{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>

<body>

<div class="estrelas"></div>

<h1>TAUANE ❤️</h1>

<p>
Hoje é o Dia da Mulher…  
mas na verdade qualquer dia fica mais bonito  
quando penso em você.

Você tem algo raro:  
a capacidade de iluminar tudo ao seu redor.

Feliz Dia da Mulher 🌹
</p>

<button onclick="tocarMusica()">Tocar música 🎶</button>

<audio id="musica" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

function tocarMusica(){
document.getElementById("musica").play();
}

function criarCoracao(){
const c=document.createElement("div")
c.className="coracao"
c.innerHTML="❤"
c.style.left=Math.random()*100+"vw"
c.style.fontSize=(10+Math.random()*25)+"px"

document.body.appendChild(c)

setTimeout(()=>{
c.remove()
},6000)
}

setInterval(criarCoracao,300)

</script>

</body>
</html>
